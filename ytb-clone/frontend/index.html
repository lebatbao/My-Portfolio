<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTube Frontpage Clone</title>

</head>
<link rel="stylesheet" href="styles.css">
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">▶ YouTube</div>
  <div class="search">
    <input placeholder="Search" />
  </div>
  <div>🔔 👤</div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>🏠 Home</div>
    <div>🔥 Trending</div>
    <div>📺 Subscriptions</div>
    <div>🎵 Music</div>
    <div>🎮 Gaming</div>
    <div>⚙ Settings</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="grid">

      <!-- VIDEO CARD -->
      <div class="card">
        <div class="thumbnail"></div>
        <div class="video-title">Awesome Video Title</div>
        <div class="channel">Channel Name • 1M views</div>
      </div>

      <div class="card">
        <div class="thumbnail"></div>
        <div class="video-title">Another Cool Video</div>
        <div class="channel">Creator • 500K views</div>
      </div>

      <div class="card">
        <div class="thumbnail"></div>
        <div class="video-title">Learn Web Design Fast</div>
        <div class="channel">Dev Channel • 200K views</div>
      </div>

      <div class="card">
        <div class="thumbnail"></div>
        <div class="video-title">Top 10 Coding Tips</div>
        <div class="channel">Tech Guru • 800K views</div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
